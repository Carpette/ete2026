name = "ete2026"
main = "worker.js"
compatibility_date = "2025-06-01"

# Fichiers statiques servis depuis public/ (index.html, etc.)
[assets]
directory = "./public"
binding = "ASSETS"

# Stockage de la position du pilote.
# 1) Crée un namespace KV dans le dashboard (Workers & Pages > KV > Create).
# 2) Colle son ID ci-dessous (remplace REMPLACE_PAR_TON_ID_KV).
[[kv_namespaces]]
binding = "POSITION_KV"
id = "a5732218f92d44e894f71e60ef447858"

# Le secret ADMIN_TOKEN n'est PAS mis ici (sinon il serait public sur GitHub).
# Définis-le dans le dashboard : ton Worker > Settings > Variables and Secrets
#   > Add > Type "Secret" > Name = ADMIN_TOKEN > Value = ton mot de passe.
